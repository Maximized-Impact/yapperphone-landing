[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/gift/success"
  to = "/gift-success.html"
  status = 200

[[redirects]]
  from = "/originals/success"
  to = "/originals-success.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
